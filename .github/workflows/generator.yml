name: Generate Plugin Repository

on:
  issues:
    types: [opened]

jobs:
  build-repo:
    # Only run if the issue has our specific label from the form
    if: contains(github.event.issue.labels.*.name, 'plugin-request')
    runs-on: ubuntu-latest
    steps:
      - name: Parse Issue Form
        id: parse
        uses: peter-murray/issue-forms-body-parser@v2.0.0
        with:
          issue_id: ${{ github.event.issue.number }}
          separator: '###'
          label_marker_start: '>>'
          label_marker_end: '<<'

      - name: Generate Secure Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Execute Creation & Invite
        uses: actions/github-script@v7
        env:
          # Extracting parsed JSON data
          PLUGIN_RAW: ${{ fromJSON(steps.parse.outputs.payload)['Desired Repository Name'] }}
          DESC: ${{ fromJSON(steps.parse.outputs.payload)['Short Description'] }}
          REQUESTER: ${{ github.event.issue.user.login }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            // 1. Sanitize the repository name to prevent weird characters
            let rawName = process.env.PLUGIN_RAW.toLowerCase().replace(/[^a-z0-9-]/g, '-');
            // NOTE: ATTACH prefix if needed like: const repoName = `plugin-${rawName}`;
            const repoName = `${rawName}`;
            
            try {
              // 2. Create the Repository
              await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: repoName,
                description: process.env.DESC,
                private: false,
                has_issues: true,
                auto_init: true // Creates an initial commit so it's not totally empty
              });
              
              // 3. Invite the user as a Maintainer
              await github.rest.repos.addCollaborator({
                owner: context.repo.owner,
                repo: repoName,
                username: process.env.REQUESTER,
                permission: 'maintain'
              });
              
              // 4. Comment on the issue with a success message
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `### 🎉 Success!\n\nHey @${process.env.REQUESTER}, your repository has been created!\n\n🔗 **Link:** [${repoName}](https://github.com/${context.repo.owner}/${repoName})\n\nCheck your email or your GitHub notifications for the repository invitation. Once you accept, you can start pushing code. Happy building! 🚀`
              });
              
              // 5. Close the issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
              
            } catch (error) {
              // Fail gracefully and notify the user if something went wrong (like a duplicate name)
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Uh oh, something went wrong.**\n\nError details: \`${error.message}\`\n\nA maintainer will look into this shortly.`
              });
              core.setFailed(error.message);
            }
