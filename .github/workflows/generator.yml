name: Generate Hero App Repository

on:
  issues:
    types: [opened]

jobs:
  build-repo:
    if: contains(github.event.issue.labels.*.name, 'hero-app-request')
    runs-on: ubuntu-latest
    steps:
      - name: Generate Secure Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Execute Creation & Invite
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            // 1. Grab the raw body of the issue
            const body = context.payload.issue.body;

            // 2. Parse the fields natively using Regex
            const nameMatch = body.match(/### Desired Repository Name\s+([^\r\n]+)/);
            const descMatch = body.match(/### Short Description\s+([\s\S]+?)(?=###|$)/);

            if (!nameMatch || !nameMatch[1].trim()) {
              throw new Error("Repository name was missing or could not be parsed from the issue form.");
            }

            // 3. Setup variables
            let rawName = nameMatch[1].trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
            // NOTE:
            // You can apply a prefix if you want like this: 
            // const repoName = `hero-app-${rawName}`;
            const repoName = `${rawName}`;
            const desc = descMatch ? descMatch[1].trim() : "Community Hero App";
            const requester = context.payload.issue.user.login;

            try {
              // 4. Create the Repository
              await github.rest.repos.createInOrg({
                org: context.repo.owner,
                name: repoName,
                description: desc,
                private: false,
                has_issues: true,
                auto_init: true
              });
              
              // 5. Invite the user as a Maintainer
              await github.rest.repos.addCollaborator({
                owner: context.repo.owner,
                repo: repoName,
                username: requester,
                permission: 'maintain'
              });
              
              // 6. Comment on the issue with a success message
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `### 🎉 Success!\n\nHey @${requester}, your repository has been created!\n\n🔗 **Link:** [${repoName}](https://github.com/${context.repo.owner}/${repoName})\n\nCheck your email or your GitHub notifications for the repository invitation. Once you accept, you can start pushing code. Happy building! 🚀`
              });
              
              // 7. Close the issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
              
            } catch (error) {
              // Since we fixed the App permissions, this error comment will now actually post!
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Uh oh, something went wrong.**\n\nError details: \`${error.message}\`\n\nA maintainer will look into this shortly.`
              });
              core.setFailed(error.message);
            }
