name: "🚀 Request a OkDoc.AI Community Hero App Repository"
description: "Automatically generate a new repository to host your OkDoc.AI hero app."
title: "[Hero App]: <Enter your hero app name>"
labels: ["hero-app-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for building in the OkDoc.AI ecosystem! Submit this form to request a new repository for your hero app.

        > ⚠️ **Important:** Do **not** include "Hero", "Hero App", or "hero-app" in your repository name.
        > The suffix is automatically appended. For example, if you enter `my-awesome-tool`, the repo will be created as `my-awesome-tool-hero-app`.
  - type: input
    id: hero-app-name
    attributes:
      label: "Desired Repository Name"
      description: "Lowercase letters and hyphens only (e.g., ai-voice-wrapper). Do NOT include 'hero-app' — it is automatically appended as a suffix."
      placeholder: "my-awesome-tool"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Short Description"
      description: "What does this hero app do?"
      placeholder: "A hero app that connects OkDoc.AI to..."
    validations:
      required: true
